name: rotation_sensor
description: >
  A package provides a stream of device's orientation in three different representations: a rotation
  matrix, a quaternion, and Euler angles (azimuth, pitch, roll).
version: 0.0.1
repository: https://github.com/tlserver/flutter_rotation_sensor

environment:
  sdk: '>=3.2.3 <4.0.0'
  flutter: '>=3.3.0'

dependencies:
  flutter:
    sdk: flutter
  logging: ^1.2.0
  # flutter_test depends on meta, so use any
  meta: any
  plugin_platform_interface: ^2.1.8
  vector_math: ^2.1.4

dev_dependencies:
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter
  lint: ^2.3.0

dependency_overrides:
  vector_math:
    git: https://github.com/tlserver/vector_math.dart

flutter:
  plugin:
    platforms:
      android:
        package: net.tlserver6y.rotation_sensor
        pluginClass: RotationSensorPlugin
      ios:
        pluginClass: RotationSensorPlugin

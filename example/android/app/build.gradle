plugins {
    id "com.android.application"
    id "kotlin-android"
    id "dev.flutter.flutter-gradle-plugin"
}

def localProperties = new Properties()
def localPropertiesFile = rootProject.file('local.properties')
if (localPropertiesFile.exists()) {
    localPropertiesFile.withReader('UTF-8') { reader ->
        localProperties.load(reader)
    }
}

def flutterVersionCode = localProperties.getProperty('flutter.versionCode')
if (flutterVersionCode == null) {
    flutterVersionCode = '1'
}

def flutterVersionName = localProperties.getProperty('flutter.versionName')
if (flutterVersionName == null) {
    flutterVersionName = '1.0'
}

// Compares two version strings (e.g., '26.1.10' vs '26.0.1')
def compareVersions(String v1, String v2) {
    List<String> v1List = v1.tokenize('.')
    List<String> v2List = v2.tokenize('.')
    int length = Math.max(v1List.size(), v2List.size())

    for (int i = 0; i < length; i++) {
        int num1 = i < v1List.size() ? v1List[i].toInteger() : 0
        int num2 = i < v2List.size() ? v2List[i].toInteger() : 0
        if (num1 != num2) {
            return num1 < num2 ? -1 : 1
        }
    }
    return 0
}

// Function to get the maximum version
def newestVersionOf(String v1, String v2) {
    return compareVersions(v1, v2) < 0 ? v2 : v1
}

android {
    namespace 'net.tlserver6y.rotation_sensor_example'
    compileSdkVersion flutter.compileSdkVersion
    ndkVersion newestVersionOf(flutter.ndkVersion, '26.1.10909125')

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_1_8
        targetCompatibility JavaVersion.VERSION_1_8
    }

    kotlinOptions {
        jvmTarget = '1.8'
    }

    sourceSets {
        main.java.srcDirs += 'src/main/kotlin'
    }

    defaultConfig {
        applicationId 'net.tlserver6y.rotation_sensor_example'
        // You can update the following values to match your application needs.
        // For more information, see: https://docs.flutter.dev/deployment/android#reviewing-the-gradle-build-configuration.
        minSdkVersion flutter.minSdkVersion
        targetSdkVersion flutter.targetSdkVersion
        versionCode flutterVersionCode.toInteger()
        versionName flutterVersionName
    }

    buildTypes {
        release {
            // Signing with the debug keys for now, so `flutter run --release` works.
            signingConfig signingConfigs.debug
        }
    }
}

flutter {
    source '../..'
}

dependencies {}
